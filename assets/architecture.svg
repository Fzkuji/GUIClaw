    <text font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#5bc4e8" text-anchor="middle" dominant-baseline="central" x="328" y="72">Ensure App Ready</text>
    <line x1="388" y1="72" x2="402" y2="72" stroke="#1d7a9a" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Act -->
    <rect x="403" y="50" width="80" height="44" rx="6" fill="#0c4030" stroke="#18936a" stroke-width="1.5"/>
    <text font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#3ddba8" text-anchor="middle" dominant-baseline="central" x="443" y="72">Act</text>
    <line x1="483" y1="72" x2="497" y2="72" stroke="#18936a" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Verify -->
    <rect x="498" y="50" width="90" height="44" rx="6" fill="#0e3a4a" stroke="#1d7a9a" stroke-width="1"/>
    <text font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#5bc4e8" text-anchor="middle" dominant-baseline="central" x="543" y="72">Verify</text>
    <line x1="588" y1="72" x2="602" y2="72" stroke="#1d7a9a" stroke-width="1.5" marker-end="url(#arrow)"/>

