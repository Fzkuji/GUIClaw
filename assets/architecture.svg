    <text font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#5bc4e8" text-anchor="middle" dominant-baseline="central" x="662" y="72">Save Workflow</text>
    <line x1="721" y1="72" x2="735" y2="72" stroke="#1d7a9a" stroke-width="1.5" marker-end="url(#arrow)"/>

