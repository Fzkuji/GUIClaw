    <text font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#3ddba8" text-anchor="middle" dominant-baseline="central" x="418" y="209">gui-act</text>

    <rect x="502" y="184" width="140" height="50" rx="6" fill="#0e2a3e" stroke="#1a5a7a" stroke-width="1"/>
    <text font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#3abcd0" text-anchor="middle" dominant-baseline="central" x="572" y="209">gui-workflow</text>

