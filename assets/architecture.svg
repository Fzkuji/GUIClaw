  <!-- Pipeline boxes (7 steps, y=50..110) -->
  <!-- Step widths: 98px each, gap 10px, total=(7*98)+(6*10)=746, offset=(900-746)/2=77 -->
  <!-- x positions: 77, 185, 293, 401, 509, 617, 725 -->

  <g>
    <!-- Intent Match -->
    <rect x="40" y="50" width="108" height="44" rx="6" fill="#0e3a4a" stroke="#1d7a9a" stroke-width="1"/>
    <text font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#5bc4e8" text-anchor="middle" dominant-baseline="central" x="94" y="72">Intent Match</text>
    <!-- arrow -->
    <line x1="148" y1="72" x2="162" y2="72" stroke="#1d7a9a" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Observe -->
    <rect x="163" y="50" width="90" height="44" rx="6" fill="#0e3a4a" stroke="#1d7a9a" stroke-width="1"/>
    <text font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#5bc4e8" text-anchor="middle" dominant-baseline="central" x="208" y="72">Observe</text>
    <line x1="253" y1="72" x2="267" y2="72" stroke="#1d7a9a" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Ensure App Ready -->
