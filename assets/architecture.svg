    <rect x="736" y="50" width="90" height="44" rx="6" fill="#1a3020" stroke="#2a7a5a" stroke-width="1"/>
    <text font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#4dcfa0" text-anchor="middle" dominant-baseline="central" x="781" y="72">Report</text>
